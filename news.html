<!DOCTYPE html>

<html>
<head>
<title>Latest News</title>

<style>

body{
background:linear-gradient(135deg,#0f172a,#111827,#0f172a);
color:white;
font-family:'Segoe UI',sans-serif;
padding:20px;
min-height:100vh;
}

.back-btn{
display:inline-block;
padding:12px 25px;
background:linear-gradient(90deg,#00ffff,#008cff);
color:white;
text-decoration:none;
border-radius:30px;
font-weight:bold;
box-shadow:0 0 15px rgba(0,255,255,.4);
transition:.3s;
margin-bottom:20px;
}

.back-btn:hover{
transform:translateY(-3px);
box-shadow:0 0 25px rgba(0,255,255,.8);
}

h1{
text-align:center;
color:#00ffff;
font-size:40px;
margin-bottom:40px;
text-shadow:0 0 15px #00ffff;
}
.news-card{
background:rgba(17,24,39,.95);
border:1px solid #00ffff;
border-radius:25px;
padding:25px;
margin:30px auto;
max-width:850px;

box-shadow:
0 0 20px rgba(0,255,255,.2);

transition:.3s;
}

.news-card:hover{
transform:translateY(-5px);
box-shadow:
0 0 30px rgba(0,255,255,.4);
}

.news-card h2{
color:#00ffff;
font-size:38px;
margin-bottom:20px;
line-height:1.3;
text-shadow:0 0 10px rgba(0,255,255,.5);
}

.news-card img{
width:100%;
height:420px;
object-fit:cover;
border-radius:18px;
margin-bottom:25px;
box-shadow:0 0 25px rgba(0,255,255,.25);
transition:.4s;
}

.news-card img:hover{
transform:scale(1.03);
}

.news-card video{
width:100%;
border-radius:18px;
margin:20px 0;
background:black;
box-shadow:0 0 25px rgba(0,255,255,.25);
}

.news-card p{
line-height:1.9;
font-size:20px;
color:#e5e7eb;
margin-top:15px;
}

.date{
margin-top:25px;
font-size:16px;
color:#94a3b8;
border-top:1px solid rgba(0,255,255,.3);
padding-top:15px;
}

.date-top{
color:#94a3b8;
margin-bottom:20px;
font-size:15px;
}

.page-title{
text-align:center;
font-size:42px;
color:#00ffff;
margin-bottom:40px;
text-shadow:0 0 15px #00ffff;
position:relative;
}

.page-title::before,
.page-title::after{
content:"";
position:absolute;
top:50%;
width:120px;
height:2px;
background:cyan;
}

.page-title::before{
left:20%;
}

.page-title::after{
right:20%;
}

.action-bar{

display:flex;
justify-content:space-between;
align-items:center;

margin-top:20px;

padding-top:15px;

border-top:1px solid rgba(255,255,255,.1);

}

.like-btn{

background:#00ffff;

border:none;

padding:10px 20px;

border-radius:30px;

cursor:pointer;

font-size:17px;

font-weight:bold;

}

.views{

font-size:18px;

color:#00ffff;

}

.comment-box{

display:flex;

gap:10px;

margin-top:20px;

}

.comment-box input{

flex:1;

padding:12px;

border:none;

border-radius:10px;

background:#1e293b;

color:white;

}

.comment-box button{

padding:12px 25px;

background:#00ffff;

border:none;

border-radius:10px;

cursor:pointer;

font-weight:bold;

}

.comments{

margin-top:20px;

}

.comment{

background:#1e293b;

padding:12px;

border-radius:10px;

margin-bottom:10px;

}

@media(max-width:768px){

.news-card{
padding:18px;
margin:15px;
}

.news-card h2{
font-size:24px;
}

.news-card p{
font-size:17px;
line-height:1.8;
}

.news-card img{
height:220px;
}

.page-title{
font-size:28px;
}

.page-title::before,
.page-title::after{
display:none;
}

}

</style>

</head>
<body>

<button onclick="history.back()" class="back-btn">
⬅ Back
</button>

<h1 class="page-title">
📰 Latest News
</h1>

<div id="newsContainer"></div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {
getFirestore,
collection,
doc,
setDoc,
addDoc,
getDoc,
getDocs,
updateDoc,
increment,
onSnapshot,
query,
orderBy,
serverTimestamp
}
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

const firebaseConfig = {
apiKey:"AIzaSyD_lK2ZVroguo02YoTTkF4yhIryJcRzrOg",
authDomain:"shidou-4f8b1.firebaseapp.com",
projectId:"shidou-4f8b1",
storageBucket:"shidou-4f8b1.firebasestorage.app",
messagingSenderId:"242900244866",
appId:"1:242900244866:web:b42bb244511b204288579b"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.likeNews = async function(id){

    const ref = doc(db,"news",id);

    await updateDoc(ref,{
        likes: increment(1)
    });

}

window.sendComment = async function(id){

    const input = document.getElementById("commentInput-"+id);

    if(input.value.trim()=="") return;

    await addDoc(
        collection(db,"news",id,"comments"),
        {
            text: input.value,
            createdAt: serverTimestamp()
        }
    );

    input.value="";

}

async function addView(id){

const ref=doc(db,"news",id);

await updateDoc(ref,{

views:increment(1)

});

}

const container =
document.getElementById("newsContainer");

const q = query(
collection(db,"news"),
orderBy("createdAt","desc")
);

onSnapshot(q,(snap)=>{

container.innerHTML="";

snap.forEach((docItem)=>{

const data = docItem.data();

let date = "";

if(data.createdAt){
date =
data.createdAt.toDate().toLocaleString();
}

const viewed =
localStorage.getItem("view_"+docItem.id);

if(!viewed){

addView(docItem.id);

localStorage.setItem("view_"+docItem.id,"1");

}

container.innerHTML += `

<div class="news-card">

<h2>${data.title}</h2>

<div class="date-top">
📅 ${date}
</div>

${data.images ? data.images.map(img=>`
<img src="${img}">
`).join("") : ""}

${data.videos ? data.videos.map(video=>`
<video
controls
preload="metadata">
<source src="${video}">
</video>
`).join("") : ""}

<p>${data.description}</p>

<div class="date">
📅 ${date}
</div>

<div class="action-bar">

<button class="like-btn"
onclick="likeNews('${docItem.id}')">

❤️
<span id="like-${docItem.id}">
${data.likes || 0}
</span>

</button>

<div class="views">

👁️
<span id="view-${docItem.id}">
${data.views || 0}
</span>

</div>

</div>

<div class="comment-box">

<input
type="text"
id="commentInput-${docItem.id}"
placeholder="Write a comment...">

<button
onclick="sendComment('${docItem.id}')">

Send

</button>

</div>

<div
class="comments"
id="comments-${docItem.id}">

</div>

</div>

`;
const commentBox =
document.getElementById("comments-"+docItem.id);

const cq = query(
collection(db,"news",docItem.id,"comments"),
orderBy("createdAt","desc")
);

onSnapshot(cq,(csnap)=>{

commentBox.innerHTML="";

csnap.forEach(c=>{

commentBox.innerHTML+=`
<div class="comment">
💬 ${c.data().text}
</div>
`;

});

});

});

});

</script>

</body>
</html>
