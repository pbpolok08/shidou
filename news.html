<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Latest News</title>

<style>
:root {
    --neon-cyan: #00ffff;
    --neon-blue: #008cff;
    --bg-dark: #040814;
    --card-bg: rgba(6, 11, 26, 0.45);
    --inner-bg: rgba(0, 0, 0, 0.6);
    --border-glow: rgba(0, 255, 255, 0.35);
}

body {
    background: radial-gradient(circle at 50% 0%, #0a1535 0%, var(--bg-dark) 85%);
    color: #e2e8f0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    margin: 0;
    padding: 0;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
}

header {
    padding: 24px 20px;
    display: flex;
    justify-content: flex-start;
    max-width: 800px;
    margin: auto;
    box-sizing: border-box;
}

.page-title {
    text-align: center;
    font-size: clamp(32px, 6vw, 54px);
    font-weight: 900;
    letter-spacing: 4px;
    text-transform: uppercase;
    background: linear-gradient(135deg, #ffffff 30%, var(--neon-cyan) 80%, var(--neon-blue) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 0 25px rgba(0, 255, 255, 0.4));
    margin: 10px auto 45px auto;
}

#newsContainer {
    display: flex;
    flex-direction: column;
    gap: 45px;
    padding: 0 16px 80px 16px;
    max-width: 750px;
    margin: auto;
    box-sizing: border-box;
}

/* Elite Glass-Cylinder Premium Card */
.news-card {
    background: var(--card-bg);
    border: 1.5px solid var(--border-glow);
    backdrop-filter: blur(40px);
    -webkit-backdrop-filter: blur(40px);
    border-radius: 28px;
    padding: 24px;
    position: relative;
    box-sizing: border-box;
    box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8), inset 0 1px 2px rgba(255, 255, 255, 0.15), 0 0 20px rgba(0, 255, 255, 0.05);
    transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.4s, border-color 0.4s;
}

@media (hover: hover) {
    .news-card:hover {
        transform: translateY(-6px) scale(1.01);
        border-color: #00ffff;
        box-shadow: 0 35px 70px rgba(0, 255, 255, 0.15), inset 0 1px 3px rgba(0, 255, 255, 0.3);
    }
}

.news-card h2 {
    color: #ffffff;
    font-size: clamp(22px, 4.8vw, 32px);
    font-weight: 800;
    margin: 0 0 16px 0;
    line-height: 1.35;
    letter-spacing: -0.2px;
}

/* Premium Tags */
.meta-tags {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
    flex-wrap: wrap;
}

.tag-premium {
    background: rgba(0, 255, 255, 0.08);
    border: 1px solid rgba(0, 255, 255, 0.25);
    padding: 6px 14px;
    border-radius: 30px;
    font-size: 11px;
    color: var(--neon-cyan);
    font-weight: 700;
    letter-spacing: 0.5px;
}

.tag-time {
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid rgba(255, 255, 255, 0.06);
    padding: 6px 14px;
    border-radius: 30px;
    font-size: 11px;
    color: #a0aec0;
    font-weight: 600;
}

/* Rounded Media Containers */
.news-card img, .news-card video {
    width: 100%;
    height: auto;
    max-height: 450px;
    object-fit: cover;
    border-radius: 20px;
    margin-bottom: 22px;
    box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
    border: 1px solid rgba(255, 255, 255, 0.05);
}

.news-card video {
    background: #000;
}

.news-card p {
    line-height: 1.8;
    font-size: clamp(15px, 2.8vw, 17px);
    color: #cbd5e1;
    margin: 0 0 24px 0;
    white-space: pre-line;
}

/* Integrated Action Control Center */
.action-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--inner-bg);
    padding: 12px 20px;
    border-radius: 18px;
    border: 1px solid rgba(255, 255, 255, 0.04);
    margin-bottom: 20px;
}

.like-btn {
    padding: 8px 18px;
    background: rgba(255, 255, 255, 0.03);
    color: #fff;
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 12px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: all 0.2s ease;
    -webkit-tap-highlight-color: transparent;
}

.like-btn:active {
    background: #ffffff;
    color: #000000;
    box-shadow: 0 0 15px #ffffff;
}

.views-box {
    font-size: 13px;
    color: var(--neon-cyan);
    font-weight: 700;
    text-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
}

/* Floating Input Suite */
.comment-box {
    display: flex;
    gap: 8px;
    background: var(--inner-bg);
    padding: 8px 10px;
    border-radius: 30px;
    border: 1px solid rgba(255, 255, 255, 0.04);
    transition: border-color 0.3s, box-shadow 0.3s;
}

.comment-box:focus-within {
    border-color: var(--neon-cyan);
    box-shadow: 0 0 15px rgba(0, 255, 255, 0.2);
}

.comment-box input {
    flex: 1;
    background: transparent;
    border: none;
    padding: 0 14px;
    color: #fff;
    font-size: 13.5px;
    outline: none;
}

.comment-box button {
    padding: 10px 22px;
    background: linear-gradient(135deg, var(--neon-cyan) 0%, var(--neon-blue) 100%);
    color: var(--bg-dark);
    border: none;
    border-radius: 24px;
    font-weight: 800;
    font-size: 12.5px;
    cursor: pointer;
    transition: transform 0.2s;
    -webkit-tap-highlight-color: transparent;
}

.comment-box button:active {
    transform: scale(0.96);
}

.comments {
    margin-top: 18px;
    max-height: 180px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 8px;
}

.comments::-webkit-scrollbar {
    width: 2px;
}
.comments::-webkit-scrollbar-thumb {
    background: var(--neon-cyan);
}

.comment {
    background: rgba(255, 255, 255, 0.015);
    padding: 12px 16px;
    border-radius: 14px;
    font-size: 13px;
    line-height: 1.5;
    color: #94a3b8;
    border: 1px solid rgba(255, 255, 255, 0.02);
}

/* Premium Back Button with Glowing Borders */
.back-btn {
    display: inline-flex;
    align-items: center;
    padding: 12px 24px;
    background: rgba(6, 11, 26, 0.6);
    color: white;
    text-decoration: none;
    border-radius: 14px;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.5px;
    border: 1.5px solid var(--border-glow);
    box-shadow: 0 0 15px rgba(0, 255, 255, 0.1);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
}

.back-btn:hover, .back-btn:active {
    background: #ffffff;
    color: #000000;
    border-color: #ffffff;
    box-shadow: 0 0 25px rgba(255, 255, 255, 0.5);
}
</style>

</head>
<body>

<header>
    <button id="customBackBtn" class="back-btn">
        ← Back
    </button>
</header>

<h1 class="page-title">
    LATEST NEWS
</h1>

<div id="newsContainer"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import {
getFirestore,
collection,
doc,
addDoc,
updateDoc,
increment,
onSnapshot,
query,
orderBy,
serverTimestamp
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

const firebaseConfig = {
apiKey:"AIzaSyD_lK2ZVroguo02YoTTkF4yhIryJcRzrOg",
authDomain:"shidou-4f8b1.firebaseapp.com",
projectId:"shidou-4f8b1",
storageBucket:"shidou-4f8b1.firebasestorage.app",
messagingSenderId:"242900244866",
appId:"1:242900244866:web:b42bb244511b204288579b"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ১০০% ওয়ার্কিং ব্যাক বাটন ট্র্যাকার লজিক
document.getElementById("customBackBtn").addEventListener("click", function(e) {
    e.preventDefault();
    if (document.referrer && document.referrer !== window.location.href) {
        window.location.href = document.referrer;
    } else {
        window.history.length > 1 ? window.history.back() : window.location.href = 'index.html';
    }
});

// গ্লোবাল ফাংশন বাইন্ডিং (যাতে বাটন ইভেন্ট মিস না হয়)
window.likeNews = async function(id){
    try {
        const ref = doc(db,"news",id);
        await updateDoc(ref,{ likes: increment(1) });
    } catch(err) { console.error("Like Error: ", err); }
}

window.sendComment = async function(id){
    const input = document.getElementById("commentInput-"+id);
    if(!input || input.value.trim() == "") return;

    try {
        await addDoc(collection(db,"news",id,"comments"), {
            text: input.value,
            createdAt: serverTimestamp()
        });
        input.value="";
    } catch(err) { console.error("Comment Error: ", err); }
}

async function addView(id){
    try {
        const ref = doc(db,"news",id);
        await updateDoc(ref,{ views: increment(1) });
    } catch(err) { console.error(err); }
}

const container = document.getElementById("newsContainer");
const q = query(collection(db,"news"), orderBy("createdAt","desc"));

onSnapshot(q,(snap)=>{
    container.innerHTML="";
    snap.forEach((docItem)=>{
        const data = docItem.data();
        let date = "";

        if(data.createdAt && data.createdAt.toDate){
            date = data.createdAt.toDate().toLocaleDateString(undefined, {month: 'short', day: 'numeric', year: 'numeric'});
        }

        const viewed = localStorage.getItem("view_"+docItem.id);
        if(!viewed){
            addView(docItem.id);
            localStorage.setItem("view_"+docItem.id,"1");
        }

        container.innerHTML += `
            <div class="news-card">
                <div class="meta-tags">
                    <span class="tag-time">📅 ${date || "Recent"}</span>
                    <span class="tag-premium">🔥 Updates</span>
                </div>

                <h2>${data.title || "Untitled News"}</h2>

                ${data.images ? data.images.map(img=>`
                    <img src="${img}" alt="News Image">
                `).join("") : ""}

                ${data.videos ? data.videos.map(video=>`
                    <video controls preload="metadata">
                        <source src="${video}">
                    </video>
                `).join("") : ""}

                <p>${data.description || ""}</p>

                <div class="action-bar">
                    <button class="like-btn" onclick="window.likeNews('${docItem.id}')">
                        ❤️ <span>${data.likes || 0}</span>
                    </button>
                    <div class="views-box">
                        👁️ <span>${data.views || 0} Views</span>
                    </div>
                </div>

                <div class="comment-box">
                    <input type="text" id="commentInput-${docItem.id}" placeholder="Join the discussion...">
                    <button onclick="window.sendComment('${docItem.id}')">Send</button>
                </div>

                <div class="comments" id="comments-${docItem.id}"></div>
            </div>
        `;

        // রিয়েলটাইম কমেন্ট লোডার
        setTimeout(() => {
            const commentBox = document.getElementById("comments-"+docItem.id);
            if(!commentBox) return;
            
            const cq = query(collection(db,"news",docItem.id,"comments"), orderBy("createdAt","desc"));
            onSnapshot(cq,(csnap)=>{
                commentBox.innerHTML="";
                csnap.forEach(c=>{
                    commentBox.innerHTML+=`
                        <div class="comment">
                            💬 ${c.data().text}
                        </div>
                    `;
                });
            });
        }, 60);
    });
});
</script>

</body>
</html>
