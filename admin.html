<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#00ffff">
<style>
body{
background:#111;
color:white;
font-family:sans-serif;
text-align:center;
padding:30px;
}

input{
margin:10px;
padding:10px;
}

button{
padding:10px 20px;
cursor:pointer;
}
</style>

</head>
<body>

<h1>🔒 Polok Admin Panel</h1>

<input
type="email"
id="email"
placeholder="Admin Email">

<br><br>

<input
type="password"
id="pass"
placeholder="Password">

<br><br>

<button
id="loginBtn"
onclick="login()">
Login
</button>


<button
id="logoutBtn"
onclick="logoutAdmin()"
style="display:none;">
🚪 Logout
</button>

<hr>

<div id="panel" style="display:none;">

<h2>Photo Upload</h2>

<input type="file" id="photo" accept="image/*">

<button onclick="uploadPhoto()">
Upload Photo
</button>

<h2>Video Upload</h2>

<input type="file" id="video" accept="video/*">

<button onclick="uploadVideo()">
Upload Video
</button>

<hr>

<h2>📰 Upload News</h2>

<input type="text" id="newsTitle" placeholder="News Title">

<br><br>

<textarea id="newsDesc"
placeholder="News Description"
style="width:300px;height:120px;"></textarea>

<br><br>

<input type="file"
id="newsImage"
accept="image/*"
multiple>

<input type="file"
id="newsVideo"
accept="video/*"
multiple>

<br><br>

<video id="videoPreview"
width="250"
controls
style="
display:none;
border:2px solid cyan;
margin-top:10px;
">
</video>

<br><br>

<img id="preview"
width="250"
style="
display:none;
border-radius:10px;
border:2px solid cyan;
margin-top:10px;
">
<br><br>

<button onclick="uploadNews()">
Publish News
</button>

<hr>

<h2>Uploaded Media</h2>
<div id="mediaList"></div>
<hr>

<h2>📰 Uploaded News</h2>

<div id="newsList"></div>
</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";


import {
getFirestore,
collection,
addDoc,
serverTimestamp,
onSnapshot,
deleteDoc,
doc,
query,
orderBy
}
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

import {
getAuth,
signInWithEmailAndPassword,
onAuthStateChanged,
signOut
}
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyD_lK2ZVroguo02YoTTkF4yhIryJcRzrOg",
authDomain: "shidou-4f8b1.firebaseapp.com",
projectId: "shidou-4f8b1",
storageBucket: "shidou-4f8b1.firebasestorage.app",
messagingSenderId: "242900244866",
appId: "1:242900244866:web:b42bb244511b204288579b"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);


function checkAdmin(){

if(!auth.currentUser){

alert("Please Login First");
throw new Error("Not Logged In");

}

}

async function login(){

const email = document.getElementById("email").value;

const password = document.getElementById("pass").value;

if(!email || !password){
alert("Email & Password Required");
return;
}

try{

await signInWithEmailAndPassword(
auth,
email,
password
);

document.getElementById("panel").style.display="block";
document.getElementById("email").style.display="none";
document.getElementById("pass").style.display="none";
document.getElementById("loginBtn").style.display="none";
document.getElementById("logoutBtn").style.display="inline-block";

alert("Login Success");

}catch(e){

alert("Wrong Email or Password");

}

}

async function uploadPhoto(){

checkAdmin();

const file =
document.getElementById("photo").files[0];

if(!file){
alert("Select Photo");
return;
}

let formData = new FormData();

formData.append("file", file);
formData.append("upload_preset","Shidou");

let res = await fetch(
"https://api.cloudinary.com/v1_1/dvly97grj/image/upload",
{
method:"POST",
body:formData
}
);

let data = await res.json();

await addDoc(collection(db,"media"),{
type:"photo",
url:data.secure_url,
createdAt:serverTimestamp()
});

document.getElementById("photo").value = "";

alert("Photo Uploaded!");

}


async function uploadVideo(){

checkAdmin();

const file =
document.getElementById("video").files[0];

if(!file){
alert("Select Video");
return;
}

let formData = new FormData();

formData.append("file", file);
formData.append("upload_preset","Shidou");

let res = await fetch(
"https://api.cloudinary.com/v1_1/dvly97grj/video/upload",
{
method:"POST",
body:formData
}
);

let data = await res.json();

await addDoc(collection(db,"media"),{
type:"video",
url:data.secure_url,
createdAt:serverTimestamp()
});

document.getElementById("video").value = "";

alert("Video Uploaded!");

}


async function uploadNews(){

checkAdmin();

let title=document.getElementById("newsTitle").value;

let desc = document.getElementById("newsDesc").value;

let imageFiles = document.getElementById("newsImage").files;
let videoFiles = document.getElementById("newsVideo").files;

if(!title || !desc){
alert("Title & Description Required!");
return;
}

let imageUrls = [];
let videoUrls = [];

// Upload Images
for(let imageFile of imageFiles){

let imgData = new FormData();

imgData.append("file", imageFile);
imgData.append("upload_preset", "Shidou");

let imgRes = await fetch(
"https://api.cloudinary.com/v1_1/dvly97grj/image/upload",
{
method:"POST",
body:imgData
}
);

let imgResult = await imgRes.json();

imageUrls.push(imgResult.secure_url);

}

// Upload Videos
for(let videoFile of videoFiles){

let videoData = new FormData();

videoData.append("file", videoFile);
videoData.append("upload_preset","Shidou");

let videoRes = await fetch(
"https://api.cloudinary.com/v1_1/dvly97grj/video/upload",
{
method:"POST",
body:videoData
}
);

let videoResult = await videoRes.json();

videoUrls.push(videoResult.secure_url);

}

// Save News
await addDoc(collection(db,"news"),{
title,
description:desc,
images:imageUrls,
videos:videoUrls,
createdAt:serverTimestamp()
});

document.getElementById("newsTitle").value = "";
document.getElementById("newsDesc").value = "";
document.getElementById("newsImage").value = "";
document.getElementById("newsVideo").value = "";

document.getElementById("preview").style.display = "none";
document.getElementById("videoPreview").style.display = "none";

document.getElementById("preview").src = "";
document.getElementById("videoPreview").src = "";

alert("News Published!");

}


window.login = login;
window.uploadPhoto = uploadPhoto;
window.uploadVideo = uploadVideo;
window.uploadNews = uploadNews;

onAuthStateChanged(auth,(user)=>{

if(user){

document.getElementById("panel").style.display="block";

document.getElementById("email").style.display="none";
document.getElementById("pass").style.display="none";

document.getElementById("loginBtn").style.display="none";
document.getElementById("logoutBtn").style.display="inline-block";

}

else{

document.getElementById("panel").style.display="none";

document.getElementById("email").style.display="inline-block";
document.getElementById("pass").style.display="inline-block";

document.getElementById("loginBtn").style.display="inline-block";
document.getElementById("logoutBtn").style.display="none";

}

});


document.getElementById("newsVideo").addEventListener("change",function(){

const file=this.files[0];

if(file){

const video=document.getElementById("videoPreview");

video.src=URL.createObjectURL(file);

video.style.display="block";

}

});


document.getElementById("newsImage").addEventListener("change", function(){

const file = this.files[0];

if(file){

const reader = new FileReader();

reader.onload = function(e){

const preview = document.getElementById("preview");

preview.src = e.target.result;
preview.style.display = "block";

};

reader.readAsDataURL(file);

}

});
const mediaList = document.getElementById("mediaList");

onSnapshot(collection(db,"media"),(snap)=>{

mediaList.innerHTML="";

snap.forEach((item)=>{

const data=item.data();

const div=document.createElement("div");

div.style.margin="15px";
div.style.padding="10px";
div.style.border="1px solid cyan";

div.innerHTML=`

<p>${data.type}</p>
<a href="${data.url}" target="_blank" style="color:cyan">View</a>
<br><br>
<button onclick="deleteMedia('${item.id}')">🗑 Delete</button>
`;

mediaList.appendChild(div);

});

});

window.deleteMedia = async function(id){

checkAdmin();

if(confirm("Delete this media?")){

await deleteDoc(doc(db,"media",id));

alert("Deleted!");

}

};

const newsList = document.getElementById("newsList");

const newsQuery = query(
collection(db,"news"),
orderBy("createdAt","desc")
);

onSnapshot(newsQuery,(snap)=>{

newsList.innerHTML="";

snap.forEach((item)=>{

const data = item.data();

const div = document.createElement("div");

div.style.margin="15px";
div.style.padding="10px";
div.style.border="1px solid yellow";

div.innerHTML = `

<h3>${data.title}</h3>

${data.images ?
data.images.map(img => `
<img
src="${img}"
style="
width:100%;
max-width:500px;
margin:10px 0;
border-radius:10px;
">
`).join("")
: ""}

${data.videos ?
data.videos.map(video => `
<video
controls
style="
width:100%;
max-width:500px;
margin:10px 0;
border-radius:10px;
">
<source src="${video}">
</video>
`).join("")
: ""}

<p>${data.description}</p>


<button onclick="deleteNews('${item.id}')">
🗑 Delete News
</button>

`;



newsList.appendChild(div);

});

});

window.deleteNews = async function(id){

checkAdmin();

if(confirm("Delete this news?")){

await deleteDoc(doc(db,"news",id));

alert("News Deleted!");

}

};

window.logoutAdmin = async function(){

await signOut(auth);

location.reload();

}

</script>
<script>
if ("serviceWorker" in navigator) {
navigator.serviceWorker.register("service-worker.js");
}



</script>
</body>
</html>
