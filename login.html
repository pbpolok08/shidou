<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Cyber Login - Polok Gallery</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* CSS VARIABLES */
        :root {
            --primary: #00ffff;
            --primary-glow: rgba(0, 255, 255, 0.5);
            --secondary: #bd00ff;
            --secondary-glow: rgba(189, 0, 255, 0.4);
            --error: #ff3333;
            --error-glow: rgba(255, 51, 51, 0.5);
            --success: #00ff66;
            --success-glow: rgba(0, 255, 102, 0.5);
            --bg-dark: #030305;
            --glass-bg: rgba(10, 11, 18, 0.55);
            --glass-border: rgba(255, 255, 255, 0.05);
            --text-main: #ffffff;
            --text-muted: #7e8e9f;
        }

        /* RESET & BASE STYLES */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: var(--bg-dark);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
            perspective: 1000px;
        }

        /* CUSTOM SCROLLBAR */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-dark);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--primary);
        }

        /* ANIMATED NEON GRADIENT BACKGROUND */
        .bg-gradient-animate {
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 20% 30%, #1a0933 0%, transparent 40%),
                        radial-gradient(circle at 80% 70%, #001f3f 0%, transparent 45%),
                        radial-gradient(circle at 50% 50%, #080912 0%, transparent 60%),
                        linear-gradient(135deg, #020204 0%, #0c051c 50%, #010b14 100%);
            z-index: 1;
            animation: bgShift 20s ease infinite alternate;
        }

        @keyframes bgShift {
            0% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(-3%, -7%) rotate(3deg); }
            100% { transform: translate(3%, 3%) rotate(-3deg); }
        }

        /* FLOATING GLOWING PARTICLES */
        .particles-container {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 2;
            overflow: hidden;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            background: var(--primary);
            box-shadow: 0 0 10px var(--primary), 0 0 20px var(--primary);
            opacity: 0;
            animation: floatParticle 9s linear infinite;
        }

        @keyframes floatParticle {
            0% {
                transform: translateY(105vh) translateX(0) scale(0.4);
                opacity: 0;
            }
            15% { opacity: 0.5; }
            85% { opacity: 0.5; }
            100% {
                transform: translateY(-5vh) translateX(80px) scale(1);
                opacity: 0;
            }
        }

        /* FLOATING LOGIN CARD ANIMATION */
        @keyframes floatCard {
            0% { transform: translateY(0px) rotateY(0deg); }
            50% { transform: translateY(-8px) rotateY(1deg); }
            100% { transform: translateY(0px) rotateY(0deg); }
        }

        /* LOGIN CONTAINER / BOX */
        .login-box {
            position: relative;
            width: 430px;
            padding: 50px 40px;
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            z-index: 3;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6),
                        inset 0 1px 1px rgba(255, 255, 255, 0.15);
            animation: floatCard 5s ease-in-out infinite, fadeIn 1.2s cubic-bezier(0.16, 1, 0.3, 1);
            transform-style: preserve-3d;
            overflow: hidden;
        }

        /* LUXURY GLOSS REFLECTION OVERLAY */
        .login-box::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -60%;
            width: 200%;
            height: 200%;
            background: linear-gradient(30deg, transparent, rgba(255, 255, 255, 0.03), transparent);
            transform: rotate(-45deg);
            pointer-events: none;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(40px) scale(0.93); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* NEON GLOWING BORDER ANIMATION */
        .login-box::before {
            content: '';
            position: absolute;
            top: -2px; left: -2px; right: -2px; bottom: -2px;
            background: linear-gradient(90deg, transparent, var(--primary), var(--secondary), transparent);
            border-radius: 30px;
            z-index: -1;
            background-size: 200% 100%;
            animation: borderGlow 5s linear infinite;
            opacity: 0.3;
            pointer-events: none;
            transition: opacity 0.4s;
        }

        @keyframes borderGlow {
            0% { background-position: 0% 0%; }
            100% { background-position: 200% 0%; }
        }

        .login-box:hover::before {
            opacity: 0.7;
        }

        /* AVATAR STYLES */
        .avatar-container {
            position: relative;
            width: 95px;
            height: 95px;
            margin: 0 auto 30px;
        }

        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid rgba(0, 255, 255, 0.2);
            object-fit: cover;
            box-shadow: 0 0 25px rgba(0, 0, 0, 0.7);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .avatar-container::after {
            content: '';
            position: absolute;
            top: -6px; left: -6px; right: -6px; bottom: -6px;
            border: 2px dashed var(--primary);
            border-radius: 50%;
            animation: rotateDashed 20s linear infinite;
            box-shadow: 0 0 15px var(--primary-glow);
            opacity: 0.7;
        }

        @keyframes rotateDashed {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .login-box:hover .avatar {
            transform: scale(1.08) rotate(8deg);
            border-color: var(--primary);
        }

        /* ANIMATED GRADIENT TEXT HEADING */
        h2 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 35px;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: linear-gradient(90deg, #ffffff, var(--primary), #ffffff, var(--secondary), #ffffff);
            background-size: 400% 100%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: textGradient 6s linear infinite;
            text-shadow: 0 0 15px rgba(0,255,255,0.3);
        }

        @keyframes textGradient {
            0% { background-position: 0% 50%; }
            100% { background-position: 400% 50%; }
        }

        /* INPUT GROUPS */
        .input-group {
            position: relative;
            margin-bottom: 24px;
            text-align: left;
        }

        .input-group i.input-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 16px;
            transition: all 0.3s ease;
            pointer-events: none;
        }

        .input-group input {
            width: 100%;
            padding: 15px 16px 15px 52px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            color: var(--text-main);
            font-size: 14.5px;
            outline: none;
            letter-spacing: 0.5px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* INPUT FOCUS ANIMATIONS */
        .input-group input:focus {
            background: rgba(255, 255, 255, 0.06);
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.25), inset 0 0 8px rgba(0, 255, 255, 0.05);
        }

        .input-group input:focus + i.input-icon {
            color: var(--primary);
            transform: translateY(-50%) scale(1.15);
            text-shadow: 0 0 10px var(--primary-glow);
        }

        /* PASSWORD TOGGLE EYE */
        .toggle-password {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            cursor: pointer;
            font-size: 15px;
            transition: color 0.3s, text-shadow 0.3s;
            padding: 5px;
            z-index: 5;
        }

        .toggle-password:hover {
            color: var(--primary);
            text-shadow: 0 0 8px var(--primary-glow);
        }

        /* UTILITY ROW */
        .utility-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            font-size: 13px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            color: var(--text-muted);
            cursor: pointer;
            user-select: none;
            transition: color 0.3s;
        }

        .remember-me:hover {
            color: var(--text-main);
        }

        .remember-me input {
            display: none;
        }

        .custom-checkbox {
            width: 18px;
            height: 18px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 6px;
            margin-right: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s;
            background: rgba(255, 255, 255, 0.01);
        }

        .remember-me input:checked + .custom-checkbox {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-color: var(--primary);
            box-shadow: 0 0 10px var(--primary-glow);
        }

        .remember-me input:checked + .custom-checkbox::after {
            content: '\f00c';
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            color: #ffffff;
            font-size: 10px;
        }

        .forgot-pass {
            color: var(--text-muted);
            text-decoration: none;
            transition: all 0.3s;
        }

        .forgot-pass:hover {
            color: var(--primary);
            text-shadow: 0 0 8px var(--primary-glow);
        }

        /* PREMIUM BUTTON STYLES */
        .btn-submit {
            position: relative;
            width: 100%;
            padding: 15px;
            background: linear-gradient(90deg, var(--secondary), var(--primary), var(--secondary));
            background-size: 200% auto;
            border: none;
            border-radius: 14px;
            color: #ffffff;
            font-size: 15px;
            font-weight: 600;
            letter-spacing: 1.5px;
            cursor: pointer;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 20px rgba(189, 0, 255, 0.25);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .btn-submit:hover {
            background-position: right center;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.4);
            transform: translateY(-2px);
        }

        .btn-submit:active {
            transform: translateY(1px);
        }

        .btn-submit:disabled {
            background: #161622;
            color: #444454;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        .btn-text {
            transition: opacity 0.3s;
        }

        /* RIPPLE EFFECT */
        .ripple {
            position: absolute;
            background: rgba(255, 255, 255, 0.35);
            border-radius: 50%;
            transform: scale(0);
            animation: rippleEffect 0.6s linear;
            pointer-events: none;
        }

        @keyframes rippleEffect {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }

        /* LOADING SPINNER */
        .spinner {
            display: none;
            width: 22px;
            height: 22px;
            border: 3px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            border-top-color: #ffffff;
            animation: spin 0.8s ease infinite;
            position: absolute;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* NOTIFICATION MESSAGES */
        .msg-container {
            min-height: 24px;
            margin-top: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .status-msg {
            font-size: 13.5px;
            font-weight: 500;
            display: none;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .status-msg.error {
            color: var(--error);
            text-shadow: 0 0 10px var(--error-glow);
        }

        .status-msg.success {
            color: var(--success);
            text-shadow: 0 0 10px var(--success-glow);
        }

        /* FOOTER */
        footer {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.25);
            font-size: 11.5px;
            letter-spacing: 0.5px;
            z-index: 3;
            text-align: center;
            width: 100%;
            pointer-events: none;
        }

        /* SHAKE ANIMATION */
        .shake {
            animation: shakeCard 0.4s ease-in-out;
        }

        @keyframes shakeCard {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-10px); }
            40%, 80% { transform: translateX(10px); }
        }

        /* SUCCESS PULSE ZOOM ANIMATION */
        .success-zoom {
            animation: successZoomOut 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes successZoomOut {
            0% { transform: scale(1); }
            50% { transform: scale(1.04); box-shadow: 0 0 60px var(--success-glow); }
            100% { transform: scale(0.96); opacity: 0.85; }
        }

        /* RESPONSIVE DESIGN */
        @media (max-width: 480px) {
            .login-box {
                width: 92%;
                padding: 40px 24px;
                margin: 20px;
            }
            h2 {
                font-size: 24px;
                margin-bottom: 25px;
            }
        }
    </style>
</head>
<body>

    <div class="bg-gradient-animate"></div>
    <div class="particles-container" id="particles"></div>

    <main class="login-box" id="loginCard">
        <div class="avatar-container">
            <img src="profile.jpg" class="avatar" alt="Polok Gallery Logo" id="avatarImg">
        </div>

        <h2>Welcome Back</h2>

        <form id="loginForm" autocomplete="off" onsubmit="handleLogin(event)">
            <div class="input-group">
                <input id="username" type="text" placeholder="Username" required autocomplete="off">
                <i class="fa-solid fa-user input-icon"></i>
            </div>

            <div class="input-group">
                <input id="password" type="password" placeholder="Password" required autocomplete="new-password">
                <i class="fa-solid fa-lock input-icon"></i>
                <i class="fa-solid fa-eye toggle-password" id="eyeIcon" onclick="togglePasswordVisibility()"></i>
            </div>

            <div class="utility-row">
                <label class="remember-me">
                    <input type="checkbox" id="rememberMe">
                    <span class="custom-checkbox"></span>
                    Remember Me
                </label>
                <a href="#" class="forgot-pass" onclick="alert('Access recovery protocol initiated. Please contact admin.')">Forgot Password?</a>
            </div>

            <button type="submit" class="btn-submit" id="submitBtn">
                <span class="btn-text" id="btnText">ACCESS SYSTEM</span>
                <div class="spinner" id="btnSpinner"></div>
            </button>
        </form>

        <div class="msg-container">
            <div class="status-msg error" id="errorMsg"><i class="fa-solid fa-triangle-exclamation"></i> Invalid Username or Password</div>
            <div class="status-msg success" id="successMsg"><i class="fa-solid fa-circle-check"></i> Login Successful! Redirecting...</div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Polok Gallery. All Rights Reserved.</p>
    </footer>

    <script>
        // 1. GENERATE FLOATING GLOWING PARTICLES DYNAMICALLY
        const particlesContainer = document.getElementById('particles');
        const particleCount = 25;

        for (let i = 0; i < particleCount; i++) {
            const particle = document.createElement('div');
            particle.classList.add('particle');
            
            const size = Math.random() * 4 + 2;
            particle.style.width = `${size}px`;
            particle.style.height = `${size}px`;
            particle.style.left = `${Math.random() * 100}vw`;
            
            const duration = Math.random() * 5 + 7;
            const delay = Math.random() * -10;
            particle.style.animationDuration = `${duration}s`;
            particle.style.animationDelay = `${delay}s`;
            
            if(i % 2 === 0) {
                particle.style.background = 'var(--secondary)';
                particle.style.boxShadow = '0 0 10px var(--secondary), 0 0 20px var(--secondary)';
            }

            particlesContainer.appendChild(particle);
        }

        // 2. PASSWORD VISIBILITY TOGGLE
        function togglePasswordVisibility() {
            const passwordInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eyeIcon');

            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.classList.remove('fa-eye');
                eyeIcon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                eyeIcon.classList.remove('fa-eye-slash');
                eyeIcon.classList.add('fa-eye');
            }
        }

        // 3. BUTTON RIPPLE EFFECT ON CLICK
        const submitBtn = document.getElementById('submitBtn');
        submitBtn.addEventListener('click', function(e) {
            if (this.disabled) return;
            
            const rect = this.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            const ripple = document.createElement('span');
            ripple.classList.add('ripple');
            ripple.style.left = `${x}px`;
            ripple.style.top = `${y}px`;

            this.appendChild(ripple);

            setTimeout(() => {
                ripple.remove();
            }, 600);
        });

        // 4. MAIN LOGIN FORM HANDLING
        function handleLogin(event) {
            event.preventDefault();

            const userField = document.getElementById('username');
            const passField = document.getElementById('password');
            const card = document.getElementById('loginCard');
            const btnText = document.getElementById('btnText');
            const btnSpinner = document.getElementById('btnSpinner');
            const errorMsg = document.getElementById('errorMsg');
            const successMsg = document.getElementById('successMsg');

            const username = userField.value.trim();
            const password = passField.value;

            errorMsg.style.display = 'none';
            errorMsg.style.opacity = '0';
            successMsg.style.display = 'none';
            successMsg.style.opacity = '0';
            card.classList.remove('shake');

            submitBtn.disabled = true;
            btnText.style.opacity = '0';
            btnSpinner.style.display = 'block';

            setTimeout(() => {
                if (username === "1234" && password === "1") {
                    btnSpinner.style.display = 'none';
                    successMsg.style.display = 'block';
                    setTimeout(() => successMsg.style.opacity = '1', 10);
                    
                    card.classList.add('success-zoom');
                    
                    localStorage.setItem("loggedIn", "true");
                    localStorage.setItem("admin", "true");

                    setTimeout(() => {
                        window.location.href = "index.html";
                    }, 1500);

                } else {
                    btnSpinner.style.display = 'none';
                    btnText.style.opacity = '1';
                    submitBtn.disabled = false;

                    card.classList.add('shake');
                    
                    errorMsg.style.display = 'block';
                    setTimeout(() => errorMsg.style.opacity = '1', 10);

                    setTimeout(() => {
                        card.classList.remove('shake');
                    }, 400);
                }
            }, 800);
        }
    </script>
</body>
</html>
