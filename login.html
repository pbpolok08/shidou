<!DOCTYPE html>
<html>
<head>
<title>Login - Polok Gallery</title>
<style>

body{
background:#050505;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:Segoe UI;
}

.login-box{
width:350px;
padding:40px;
text-align:center;
background:#111;
border-radius:20px;
box-shadow:0 0 25px #00ffff;
}

.avatar{
width:90px;
height:90px;
border-radius:50%;
border:3px solid #00ffff;
margin-bottom:15px;
}

h2{
color:#00ffff;
}

input{
width:100%;
padding:12px;
margin:10px 0;
background:#222;
border:1px solid #333;
border-radius:10px;
color:white;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:30px;
background:linear-gradient(90deg,#00ffff,#008cff);
color:white;
font-size:18px;
cursor:pointer;
}

</style>
</head>
<body>

<div class="login-box">

<img src="profile.jpg" class="avatar">

<h2>Welcome Back</h2>

    <form autocomplete="off"></form>

<input id="user" type="text" placeholder="Username" autocomplete="off">
<input id="pass" type="password" placeholder="Password" autocomplete="new-password">
<button type="button" onclick="login()">Login</button>
<label>
<input type="checkbox" onclick="showPass()">
 Show Password
</label>
</form>

</div>
<script>

function login(){

let user = document.getElementById("user").value;
let pass = document.getElementById("pass").value;

if(user=="polok" && pass=="1682008"){

localStorage.setItem("loggedIn","true");
window.location.href="index.html";

}else{

alert("Wrong Username or Password");

}

}



</script><script>

function showPass(){

let x = document.getElementById("pass");

if(x.type=="password"){
x.type="text";
}else{
x.type="password";
}

}

</script>

</body>
</html>
