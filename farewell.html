<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultra Premium Farewell Gallery</title>

<style>
:root {
    --neon-cyan: #00ffff;
    --neon-blue: #008cff;
    --neon-purple: #bd00ff;
    --neon-pink: #ff007f;
    --pure-black: #020204;
    --glass-bg: rgba(6, 6, 14, 0.6);
    --glass-border: rgba(255, 255, 255, 0.04);
}

body {
    background: radial-gradient(circle at 50% 0%, #1a103c 0%, #070514 40%, var(--pure-black) 100%);
    color: #f1f5f9;
    font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
    text-align: center;
    margin: 0;
    padding: 0;
    min-height: 100vh;
    overflow-x: hidden;
}

/* Elite Scrollbar */
::-webkit-scrollbar {
    width: 8px;
}
::-webkit-scrollbar-track {
    background: var(--pure-black);
}
::-webkit-scrollbar-thumb {
    background: linear-gradient(var(--neon-cyan), var(--neon-purple), var(--neon-pink));
    border-radius: 20px;
}

header {
    padding: 25px 50px;
    background: rgba(2, 2, 4, 0.5);
    backdrop-filter: blur(30px);
    -webkit-backdrop-filter: blur(30px);
    display: flex;
    justify-content: flex-start;
    border-bottom: 1px solid rgba(255, 255, 255, 0.02);
    position: sticky;
    top: 0;
    z-index: 100;
}

.back-btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 12px 28px;
    background: rgba(255, 255, 255, 0.01);
    color: #fff;
    text-decoration: none;
    border-radius: 50px;
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 0.5px;
    border: 1px solid var(--glass-border);
    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    backdrop-filter: blur(10px);
}

.back-btn:hover {
    background: #ffffff;
    color: #000000;
    box-shadow: 0 0 30px rgba(255, 255, 255, 0.8), 0 0 50px rgba(0, 255, 255, 0.2);
    transform: translateY(-2px);
}

h1 {
    font-size: clamp(36px, 7vw, 65px);
    font-weight: 900;
    letter-spacing: -2px;
    background: linear-gradient(135deg, #ffffff 10%, #a6fffa 50%, var(--neon-cyan) 80%, var(--neon-purple) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 2px 30px rgba(0, 255, 255, 0.3));
    margin-top: 60px;
    margin-bottom: 60px;
}

.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
    gap: 45px;
    padding: 0 50px 80px 50px;
    max-width: 1500px;
    margin: auto;
    box-sizing: border-box;
}

/* 1000x Ultra-Luxury Cyber Glass Card */
.gallery > div {
    background: var(--glass-bg);
    backdrop-filter: blur(30px);
    -webkit-backdrop-filter: blur(30px);
    border: 1px solid var(--glass-border);
    border-radius: 32px;
    padding: 22px;
    box-sizing: border-box;
    box-shadow: 0 40px 80px rgba(0,0,0,0.8), inset 0 1px 1px rgba(255,255,255,0.07);
    transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    position: relative;
    overflow: hidden;
}

/* Background Aura Glow on Hover */
.gallery > div::after {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, rgba(0,255,255,0.08) 0%, rgba(189,0,255,0.03) 50%, transparent 70%);
    opacity: 0;
    transition: opacity 0.6s ease;
    pointer-events: none;
    z-index: 1;
}

.gallery > div:hover::after {
    opacity: 1;
}

.gallery > div:hover {
    transform: translateY(-15px) scale(1.02);
    border-color: rgba(0, 255, 255, 0.6);
    box-shadow: 0 40px 80px rgba(0, 255, 255, 0.12), 0 0 60px rgba(189, 0, 255, 0.08);
}

/* Media Wrapper Mesh */
.media-wrapper {
    width: 100%;
    height: 350px;
    border-radius: 24px;
    overflow: hidden;
    position: relative;
    box-shadow: 0 20px 45px rgba(0,0,0,0.6);
    background: #020204;
    z-index: 2;
}

.gallery img, .gallery video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
}

.gallery img {
    cursor: pointer;
}

.gallery img:hover {
    transform: scale(1.08);
}

/* Floating Badges */
.media-badge {
    position: absolute;
    top: 18px;
    right: 18px;
    padding: 7px 18px;
    border-radius: 40px;
    font-size: 11px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    z-index: 10;
    box-shadow: 0 8px 20px rgba(0,0,0,0.4);
}

.badge-photo { 
    background: rgba(0, 255, 255, 0.12); 
    color: var(--neon-cyan); 
    border: 1px solid rgba(0, 255, 255, 0.4); 
    text-shadow: 0 0 10px rgba(0,255,255,0.5);
}
.badge-video { 
    background: rgba(255, 0, 127, 0.12); 
    color: #ff55aa; 
    border: 1px solid rgba(255, 0, 127, 0.4); 
    text-shadow: 0 0 10px rgba(255, 0, 127, 0.5);
}

/* Premium Navigation Controller/Action Bar */
.action-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
    margin-top: 25px;
    background: rgba(255, 255, 255, 0.01);
    padding: 12px 20px;
    border-radius: 50px;
    border: 1px solid rgba(255, 255, 255, 0.03);
    position: relative;
    z-index: 2;
}

.action-btn {
    padding: 11px 20px;
    background: rgba(255, 255, 255, 0.02);
    color: #f1f5f9;
    text-decoration: none;
    border: 1px solid rgba(255, 255, 255, 0.04);
    border-radius: 40px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 700;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

.action-btn:hover {
    background: #ffffff;
    color: #000000;
    box-shadow: 0 0 25px rgba(255,255,255,0.6);
    transform: translateY(-3px);
}

.views { 
    font-size: 14px; 
    color: var(--neon-cyan); 
    font-weight: 800; 
    letter-spacing: 0.5px;
    text-shadow: 0 0 15px rgba(0,255,255,0.5);
}

/* Cinematic Comment Infrastructure */
.comment-box-container { 
    margin-top: 25px; 
    display: flex; 
    gap: 12px; 
    position: relative;
    z-index: 2;
}

.comment-box-container input { 
    flex: 1; 
    background: rgba(0, 0, 0, 0.5); 
    border: 1px solid rgba(255, 255, 255, 0.04); 
    padding: 16px 22px; 
    border-radius: 50px; 
    color: white; 
    font-size: 13px;
    outline: none;
    transition: all 0.4s ease;
}

.comment-box-container input:focus { 
    border-color: var(--neon-cyan); 
    background: rgba(0,0,0,0.7);
    box-shadow: 0 0 25px rgba(0,255,255,0.2);
}

.comment-box-container button { 
    padding: 16px 26px; 
    background: linear-gradient(90deg, var(--neon-cyan), var(--neon-blue)); 
    color: white; 
    border: none; 
    border-radius: 50px; 
    font-weight: 800; 
    font-size: 13px;
    cursor: pointer; 
    transition: all 0.3s ease;
    box-shadow: 0 5px 20px rgba(0, 140, 255, 0.3);
}

.comment-box-container button:hover { 
    box-shadow: 0 0 30px var(--neon-blue);
    transform: scale(1.04);
}

.comments-list { 
    margin-top: 22px; 
    max-height: 180px; 
    overflow-y: auto; 
    text-align: left; 
    position: relative;
    z-index: 2;
}

.single-comment { 
    background: rgba(255, 255, 255, 0.01); 
    padding: 14px 18px; 
    margin-top: 12px; 
    border-radius: 20px; 
    font-size: 13px; 
    line-height: 1.6;
    border-left: 4px solid;
    border-image: linear-gradient(to bottom, var(--neon-cyan), var(--neon-pink)) 1 100%;
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
}

.status-msg {
    color: var(--neon-cyan);
    font-size: 20px;
    font-weight: 700;
    margin-top: 60px;
    text-shadow: 0 0 25px rgba(0,255,255,0.4);
}
</style>
</head>
<body>

<header>
<a href="index.html" class="back-btn">⬅ Back Home</a>
</header>

<h1>Farewell</h1>

<div class="gallery" id="gallery">
    <p class="status-msg">Loading Elite Artworks...</p>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import {
getFirestore,
collection,
doc,
addDoc,
updateDoc,
increment,
onSnapshot,
where,
query,
orderBy,
serverTimestamp
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyD_lK2ZVroguo02YoTTkF4yhIryJcRzrOg",
authDomain: "shidou-4f8b1.firebaseapp.com",
projectId: "shidou-4f8b1",
storageBucket: "shidou-4f8b1.firebasestorage.app",
messagingSenderId: "242900244866",
appId: "1:242900244866:web:b42bb244511b204288579b"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.likeMedia = async function(id){
    await updateDoc(doc(db,"media",id),{ likes: increment(1) });
}

window.sendComment = async function(id){
    const input = document.getElementById("comment-"+id);
    if(input.value.trim() == "") return;
    await addDoc(collection(db,"media",id,"comments"), { text: input.value, createdAt: serverTimestamp() });
    input.value = "";
}

async function addView(id){
    await updateDoc(doc(db,"media",id),{ views: increment(1) });
}

const gallery = document.getElementById("gallery");

const q = query(collection(db, "media"), where("category", "==", "farewell"));

onSnapshot(q, (snap) => {
    gallery.innerHTML = "";
    if(snap.empty) {
        gallery.innerHTML = "<p class='status-msg'>No Media Discovered inside Picnic Matrix!</p>";
        return;
    }
    
    snap.forEach((docItem) => {
        const data = docItem.data();
        const docId = docItem.id;

        const viewed = localStorage.getItem("viewed_" + docId);
        if(!viewed){
            addView(docId);
            localStorage.setItem("viewed_" + docId, "1");
        }

        const card = document.createElement("div");
        let mediaTag = data.type === "video" ? `<video src="${data.url}" controls playsinline></video>` : `<img src="${data.url}" onclick="window.open('${data.url}','_blank')">`;
        let badgeTag = data.type === "video" ? `<span class="media-badge badge-video">📹 Video</span>` : `<span class="media-badge badge-photo">🖼️ Photo</span>`;

        card.innerHTML = `
            <div class="media-wrapper">${badgeTag}${mediaTag}</div>
            <div class="action-bar">
                <button class="action-btn" onclick="likeMedia('${docId}')">❤️ ${data.likes || 0}</button>
                <a href="${data.url}" target="_blank" class="action-btn">🔗 Full View</a>
                <button class="action-btn" onclick="shareMedia('${data.url}')">📤 Share</button>
                <span class="views">👁️ ${data.views || 0}</span>
            </div>
            <div class="comment-box-container">
                <input id="comment-${docId}" placeholder="Leave a legacy comment...">
                <button onclick="sendComment('${docId}')">Send</button>
            </div>
            <div class="comments-list" id="comments-${docId}"></div>
        `;
        gallery.appendChild(card);

        const commentBox = document.getElementById("comments-" + docId);
        onSnapshot(collection(db, "media", docId, "comments"), (commentSnap) => {
            commentBox.innerHTML = "";
            commentSnap.forEach(c => {
                commentBox.innerHTML += `<div class="single-comment">💬 ${c.data().text}</div>`;
            });
        });
    });
});

window.shareMedia = function(url){
    if(navigator.share){ navigator.share({ title: "Picnic Elite Memories", url: url }); } 
    else { navigator.clipboard.writeText(url); alert("💎 Secured Link Copied Successfully!"); }
}
</script>
</body>
</html>
