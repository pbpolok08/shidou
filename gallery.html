<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>My Photo Gallery</title>

<style>
:root {
    --neon-cyan: #00ffff;
    --neon-blue: #008cff;
    --neon-pink: #ff007f;
    --pure-black: #030305;
    --glass-card: rgba(255, 255, 255, 0.01);
}

body {
    background: radial-gradient(circle at 50% 0%, #0a0e20 0%, var(--pure-black) 80%);
    color: #f1f1f6;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    text-align: center;
    margin: 0;
    padding: 0;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
}

header {
    padding: 20px 16px;
    display: flex;
    justify-content: flex-start;
    max-width: 1400px;
    margin: auto;
    box-sizing: border-box;
}

h1 {
    font-size: clamp(28px, 6vw, 54px);
    font-weight: 900;
    letter-spacing: 4px;
    text-transform: uppercase;
    background: linear-gradient(135deg, #ffffff 10%, var(--neon-cyan) 60%, var(--neon-blue) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 0 25px rgba(0, 255, 255, 0.4));
    margin: 15px 16px 40px 16px;
}

.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 24px;
    padding: 0 16px 40px 16px;
    max-width: 1400px;
    margin: auto;
    box-sizing: border-box;
}

@media (max-width: 360px) {
    .gallery {
        grid-template-columns: 1fr;
    }
}

/* 10X Hyper-Luxury Mobile Responsive Card */
.gallery-card-wrapper {
    background: var(--glass-card);
    border: 1px solid rgba(255, 255, 255, 0.03);
    backdrop-filter: blur(30px);
    -webkit-backdrop-filter: blur(30px);
    border-radius: 24px;
    padding: 14px;
    position: relative;
    overflow: hidden;
    box-sizing: border-box;
    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.7), inset 0 1px 0 rgba(255, 255, 255, 0.05);
    transition: transform 0.4s cubic-bezier(0.1, 0.76, 0.55, 0.94), border-color 0.4s, box-shadow 0.4s;
}

/* Luxury Border Effect */
.gallery-card-wrapper::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 24px;
    padding: 1px;
    background: linear-gradient(135deg, rgba(255, 255, 255, 0.08), rgba(0, 255, 255, 0.02), rgba(255, 0, 127, 0.05));
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    pointer-events: none;
    transition: background 0.4s;
}

/* Interactive Hover/Touch Effects */
@media (hover: hover) {
    .gallery-card-wrapper:hover {
        transform: translateY(-8px) scale(1.015);
        border-color: rgba(0, 255, 255, 0.25);
        box-shadow: 0 25px 60px rgba(0, 255, 255, 0.12), inset 0 1px 0 rgba(0, 255, 255, 0.15);
    }
    .gallery-card-wrapper:hover::before {
        background: linear-gradient(135deg, var(--neon-cyan), var(--neon-blue), var(--neon-pink));
    }
}

.gallery img {
    width: 100%;
    height: clamp(240px, 40vw, 320px);
    object-fit: cover;
    border-radius: 18px;
    box-shadow: 0 12px 28px rgba(0, 0, 0, 0.5);
    transition: transform 0.5s cubic-bezier(0.1, 0.76, 0.55, 0.94), filter 0.4s;
    -webkit-user-drag: none;
}

.gallery-card-wrapper:hover img {
    transform: scale(1.02);
    filter: brightness(1.05);
}

/* Cinematic Mobile-First Action Bar */
.action-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
    margin-top: 18px;
    background: rgba(0, 0, 0, 0.4);
    padding: 8px 14px;
    border-radius: 40px;
    border: 1px solid rgba(255, 255, 255, 0.04);
}

.btn-group {
    display: flex;
    gap: 8px;
}

.action-btn {
    padding: 10px 16px;
    background: rgba(255, 255, 255, 0.03);
    color: #f1f1f6;
    text-decoration: none;
    border: 1px solid rgba(255, 255, 255, 0.05);
    border-radius: 40px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 6px;
    letter-spacing: 0.3px;
    transition: all 0.3s ease;
    -webkit-tap-highlight-color: transparent;
}

.action-btn:hover, .action-btn:active {
    background: #ffffff;
    border-color: #ffffff;
    box-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
    color: #000000;
}

.views {
    font-size: 13px;
    color: var(--neon-cyan);
    font-weight: 800;
    text-shadow: 0 0 12px rgba(0, 255, 255, 0.5);
}

/* Premium Responsive Comment Section */
.comment-section {
    margin-top: 18px;
    display: flex;
    gap: 8px;
}

.comment-input {
    flex: 1;
    background: rgba(0, 0, 0, 0.5);
    border: 1px solid rgba(255, 255, 255, 0.05);
    padding: 12px 16px;
    border-radius: 40px;
    color: #fff;
    font-size: 13px;
    outline: none;
    box-sizing: border-box;
    transition: border-color 0.3s, box-shadow 0.3s;
}

.comment-input:focus {
    border-color: var(--neon-cyan);
    background: rgba(0, 0, 0, 0.7);
    box-shadow: 0 0 15px rgba(0, 255, 255, 0.15);
}

.comment-submit-btn {
    padding: 12px 20px;
    background: linear-gradient(135deg, var(--neon-cyan) 0%, var(--neon-blue) 100%);
    color: #030305;
    border: none;
    border-radius: 40px;
    font-weight: 800;
    font-size: 13px;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.3s;
    -webkit-tap-highlight-color: transparent;
}

.comment-submit-btn:active {
    transform: scale(0.95);
}

.comments-display-box {
    margin-top: 14px;
    max-height: 160px;
    overflow-y: auto;
    text-align: left;
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding-right: 4px;
}

.comments-display-box::-webkit-scrollbar {
    width: 3px;
}
.comments-display-box::-webkit-scrollbar-thumb {
    background: var(--neon-cyan);
    border-radius: 10px;
}

.single-comment {
    background: rgba(255, 255, 255, 0.02);
    padding: 12px 14px;
    border-radius: 16px;
    font-size: 12.5px;
    line-height: 1.5;
    border-left: 3px solid var(--neon-cyan);
    color: #d1d1db;
}

/* Premium Back Button Mobile Optimized */
.back-btn {
    display: inline-flex;
    align-items: center;
    padding: 12px 24px;
    background: rgba(255, 255, 255, 0.02);
    color: white;
    text-decoration: none;
    border-radius: 40px;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    border: 1px solid rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    transition: all 0.3s;
    -webkit-tap-highlight-color: transparent;
}

.back-btn:hover, .back-btn:active {
    background: #ffffff;
    color: #000000;
    box-shadow: 0 0 25px rgba(255, 255, 255, 0.5);
    transform: translateY(-2px);
}
</style>

</head>
<body>

<header>
    <a href="index.html" class="back-btn">
        ⬅ Back Home
    </a>
</header>

<h1>My Photo Gallery</h1>

<div class="gallery" id="gallery"></div>

<script>
if(localStorage.getItem("loggedIn")!="true"){
    window.location.href="login.html";
}
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import {
getFirestore,
collection,
doc,
addDoc,
updateDoc,
increment,
onSnapshot,
query,
orderBy,
serverTimestamp
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyD_lK2ZVroguo02YoTTkF4yhIryJcRzrOg",
authDomain: "shidou-4f8b1.firebaseapp.com",
projectId: "shidou-4f8b1",
storageBucket: "shidou-4f8b1.firebasestorage.app",
messagingSenderId: "242900244866",
appId: "1:242900244866:web:b42bb244511b204288579b"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.likePhoto = async function(id){
    await updateDoc(doc(db,"media",id),{
        likes: increment(1)
    });
}

window.sendComment = async function(id){
    const input=document.getElementById("comment-"+id);
    if(input.value.trim()=="") return;

    await addDoc(
        collection(db,"media",id,"comments"),
        {
            text:input.value,
            createdAt:serverTimestamp()
        }
    );
    input.value="";
}

async function addView(id){
    await updateDoc(doc(db,"media",id),{
        views:increment(1)
    });
}

const gallery = document.getElementById("gallery");

onSnapshot(collection(db,"media"),(snap)=>{
    gallery.innerHTML="";
    snap.forEach((doc)=>{
        const data = doc.data();

        if(data.type==="photo"){
            const viewed=localStorage.getItem("photo_"+doc.id);
            if(!viewed){
                addView(doc.id);
                localStorage.setItem("photo_"+doc.id,"1");
            }

            const card=document.createElement("div");
            card.className = "gallery-card-wrapper";
            card.innerHTML=`
                <img src="${data.url}" onclick="window.open('${data.url}','_blank')">
                
                <div class="action-bar">
                    <div class="btn-group">
                        <button class="action-btn" onclick="likePhoto('${doc.id}')">
                            ❤️ <span>${data.likes || 0}</span>
                        </button>
                        <a href="${data.url}" download class="action-btn">
                            📥 Download
                        </a>
                        <button class="action-btn" onclick="sharePhoto('${data.url}')">
                            🔗 Share
                        </button>
                    </div>
                    <span class="views">
                        👁️ ${data.views || 0}
                    </span>
                </div>

                <div class="comment-section">
                    <input 
                        class="comment-input"
                        id="comment-${doc.id}" 
                        placeholder="Write a comment...">
                    <button class="comment-submit-btn" onclick="sendComment('${doc.id}')">
                        Send
                    </button>
                </div>

                <div class="comments-display-box" id="comments-${doc.id}"></div>
            `;

            gallery.appendChild(card);

            const commentBox=document.getElementById("comments-"+doc.id);
            const cq=query(
                collection(db,"media",doc.id,"comments"),
                orderBy("createdAt","desc")
            );

            onSnapshot(cq,(snap)=>{
                commentBox.innerHTML="";
                snap.forEach(c=>{
                    commentBox.innerHTML+=`
                        <div class="single-comment">
                            💬 ${c.data().text}
                        </div>
                    `;
                });
            });
        }
    });
});

window.sharePhoto = function(url){
    if(navigator.share){
        navigator.share({
            title:"Polok Gallery",
            url:url
        });
    }else{
        navigator.clipboard.writeText(url);
        alert("✅ Link Copied");
    }
}
</script>

</body>
</html>
